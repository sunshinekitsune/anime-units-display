#「#」を削除して

#animehint.desktopMove = Use [accent][[WASD][] to move.
#animehint.zoom = [accent]Scroll[] to zoom in or out.
#animehint.desktopShoot = [accent][[Left-click][] to shoot.
#animehint.depositItems = To transfer items, drag from your ship to the core.
#animehint.respawn = To respawn as a ship, press [accent][[V][].
#animehint.respawn.mobile = You have switched control to a unit/structure. To respawn as a ship, [accent]tap the avatar in the top left.[]
#animehint.desktopPause = Press [accent][[Space][] to pause and unpause the game.
#animehint.breaking = [accent]Right-click[] and drag to break blocks.
#animehint.breaking.mobile = Activate the :hammer: [accent]hammer[] in the bottom right and tap to break blocks.\n\nHold down your finger for a second and drag to break in a selection.
#animehint.blockInfo = View input items and stats of a block by selecting it in the [accent]build menu[], then selecting the [accent][[?][] button at the right.
#animehint.derelict = [accent]Derelict[] structures are broken remnants of old bases that no longer function.\n\nThese structures can be [accent]deconstructed[] for resources, or repaired.
#animehint.research = Use the :tree: [accent]Research[] button to research new technology.
#animehint.research.mobile = Use the :tree: [accent]Research[] button in the :menu: [accent]Menu[] to research new technology.
#animehint.unitControl = Hold [accent][[L-ctrl][] and [accent]click[] to manually control friendly units or turrets.
#animehint.unitControl.mobile = [accent][[Double-tap][] to manually control friendly units or turrets.
#animehint.unitSelectControl = To control units, enter [accent]command mode[] by holding [accent]L-shift.[]\nWhile in command mode, click and drag to select units. [accent]Right-click[] a location or target to command units there.
#animehint.unitSelectControl.mobile = To control units, enter [accent]command mode[] by pressing the [accent]command[] button in the bottom left.\nWhile in command mode, long-press and drag to select units. Tap a location or target to command units there.
#animehint.launch = Once enough resources are collected, you can [accent]Launch[] to the next sector by opening the :map: [accent]Map[] in the bottom right, and panning over to the new location.
#animehint.launch.mobile = Once enough resources are collected, you can [accent]Launch[] by selecting nearby sectors from the :map: [accent]Map[] in the :menu: [accent]Menu[].
#animehint.schematicSelect = Hold [accent][[F][] and drag to select blocks to copy and paste.\n\n[accent][[Middle Click][] to copy a single block type.
#animehint.rebuildSelect = Hold [accent][[B][] and drag to select destroyed block plans.\nThis will rebuild them automatically.
#animehint.rebuildSelect.mobile = Select the :copy: copy button, then tap the :wrench: rebuild button and drag to select destroyed block plans.\nThis will rebuild them automatically.
#animehint.conveyorPathfind = Hold [accent][[L-Ctrl][] while dragging conveyors to automatically generate a path.
#animehint.conveyorPathfind.mobile = Enable :diagonal: [accent]diagonal mode[] and drag conveyors to automatically generate a path.
#animehint.boost = Hold [accent][[L-Shift][] to fly over obstacles with your current unit.\n\nOnly a few ground units have boosters.
#animehint.payloadPickup = Press [accent][[[] to pick up small blocks or units.
#animehint.payloadPickup.mobile = [accent]Tap and hold[] a small block or unit to pick it up.
#animehint.payloadDrop = Press [accent]][] to drop a payload.
#animehint.payloadDrop.mobile = [accent]Tap and hold[] an empty location to drop a payload there.
#animehint.waveFire = [accent]Wave[] turrets with water as ammunition will automatically put out nearby fires.
#animehint.guardian = [accent]Guardian[] units are armored. Weak ammo such as [accent]Copper[] and [accent]Lead[] is [scarlet]not effective[].\n\nUse higher tier turrets or :graphite: [accent]Graphite[] :duo:Duo/:salvo:Salvo ammunition to take Guardians down.
#animehint.coreUpgrade = Cores can be upgraded by [accent]placing higher-tier cores over them[].\n\nPlace a :core-foundation: [accent]Foundation[] core over the :core-shard: [accent]Shard[] core. Make sure it is free from nearby obstructions.
#animehint.serpuloCoreZone = Additional :core-shard: [accent]Cores[] may be constructed on :core-zone: [accent]Core Zone[] tiles.
#animehint.cannotUpgrade = A [red]:tree:[] icon over a payload unit indicates that its upgraded version is not researched yet.\n\nUnit upgrades must be researched in the [accent]:tree: tech tree[] before they can be produced in reconstructors.
#animehint.presetLaunch = Gray [accent]landing zone sectors[], such as [accent]Frozen Forest[], can be launched to from anywhere. They do not require capture of nearby territory.\n\n[accent]Numbered sectors[], such as this one, are [accent]optional[].
#animehint.presetDifficulty = This sector has a [scarlet]high enemy threat level[].\nLaunching to such sectors is [accent]not recommended[] without proper technology and preparation.
#animehint.coreIncinerate = After the core is filled to capacity with an item, any extra items of that type it receives will be [accent]incinerated[].
#animehint.factoryControl = To set a unit factory's [accent]output destination[], click a factory block while in command mode, then right-click a location.\nUnits produced by it will automatically move there.
#animehint.factoryControl.mobile = To set a unit factory's [accent]output destination[], tap a factory block while in command mode, then tap a location.\nUnits produced by it will automatically move there.
